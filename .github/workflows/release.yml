name: Release

on:
    push:
        branches:
            - main

jobs:
    release:
        name: Publish packages
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - uses: pnpm/action-setup@v6
              name: Install pnpm
              with:
                  run_install: false

            - name: Install Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: "pnpm"

            - name: Upgrade npm for OIDC trusted publishing
              # Pin to the 11.x line: npm 12.0.0 ships a broken provenance path
              # (MODULE_NOT_FOUND 'sigstore'). 11.x supports trusted publishing
              # (>= 11.5.1) without the bug. See npm/cli#9722.
              run: npm install -g npm@11

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm -r run build

            - name: Create Release Pull Request or Publish
              id: changesets
              uses: changesets/action@v1
              with:
                  publish: pnpm -w changeset publish
                  version: pnpm -w changeset version
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
